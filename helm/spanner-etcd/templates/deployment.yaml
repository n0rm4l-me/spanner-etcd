apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spanner-etcd.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spanner-etcd.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "spanner-etcd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spanner-etcd.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.service.metricsPort | quote }}
        prometheus.io/path: "/metrics"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriod.seconds }}
      serviceAccountName: {{ include "spanner-etcd.fullname" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: spanner-etcd
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- if or .Values.auth.users .Values.auth.existingSecret }}
            - name: ETCD_AUTH_USERS
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.auth.existingSecret }}{{ .Values.auth.existingSecret }}{{ else }}{{ include "spanner-etcd.fullname" . }}-auth{{ end }}
                  key: {{ .Values.auth.existingSecretKey }}
            {{- end }}
          args:
            - --spanner-database={{ required "spannerDatabase is required" .Values.spannerDatabase }}
            - --listen-address={{ .Values.listenAddr }}
            - --metrics-addr={{ .Values.metricsAddr }}
            - --log-level={{ .Values.logLevel }}
            {{- if .Values.auth.tokenTTL }}
            - --auth-token-ttl={{ .Values.auth.tokenTTL }}
            {{- end }}
            {{- if .Values.tls.existingSecret }}
            - --tls-cert=/tls/tls.crt
            - --tls-key=/tls/tls.key
            - --tls-ca=/tls/ca.crt
            {{- end }}
          ports:
            - name: etcd
              containerPort: 2379
              protocol: TCP
            - name: metrics
              containerPort: 2381
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                # Sleep gives Kubernetes time to remove the pod from Service endpoints
                # before SIGTERM is sent. Without this, new requests arrive on the
                # terminating pod during the ~1-5s endpoint propagation window.
                # Google recommends 15s; we use the configurable value.
                command: ["sleep", "{{ .Values.terminationGracePeriod.preStopSleepSeconds }}"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.tls.existingSecret }}
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
          {{- end }}
      {{- if .Values.tls.existingSecret }}
      volumes:
        - name: tls
          secret:
            secretName: {{ .Values.tls.existingSecret }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
