apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "spanner-etcd.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spanner-etcd.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
